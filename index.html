<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCP Foundation — Архив Аномальных Объектов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg2: #0f0f18;
            --bg3: #151520;
            --card: #1a1a28;
            --cardh: #222236;
            --glass: rgba(20, 20, 35, 0.6);
            --glassh: rgba(30, 30, 50, 0.8);
            --red: #e63946;
            --red2: #c1121f;
            --rg: rgba(230, 57, 70, 0.3);
            --rb: #ff6b6b;
            --orange: #f4a261;
            --green: #2a9d8f;
            --blue: #457b9d;
            --purple: #9b5de5;
            --tp: #eaeaea;
            --ts: #b0b0b0;
            --tm: #707070;
            --td: #4a4a5a;
            --bs: rgba(255, 255, 255, 0.04);
            --bm: rgba(255, 255, 255, 0.08);
            --bb: rgba(255, 255, 255, 0.15);
            --radius-sm: 6px;
            --radius: 12px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-red: 0 0 30px rgba(230, 57, 70, 0.15);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--tp);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Анимированный фон */
        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(230, 57, 70, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230, 57, 70, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }
        .bg-glow {
            position: absolute;
            top: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(230, 57, 70, 0.08) 0%, transparent 70%);
            animation: glowPulse 8s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        /* Хедер */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--bs);
            transition: var(--transition);
        }
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            text-decoration: none;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            position: relative;
        }
        .logo-icon svg { width: 100%; height: 100%; }
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .logo-title {
            font-family: var(--mono);
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }
        .logo-subtitle {
            font-family: var(--mono);
            font-size: 0.5rem;
            letter-spacing: 2px;
            color: var(--red);
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
        }
        .search-wrapper {
            position: relative;
            max-width: 320px;
            width: 100%;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--tm);
            font-size: 0.85rem;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px 10px 36px;
            border: 1px solid var(--bm);
            border-radius: 100px;
            background: var(--glass);
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }
        .search-input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px var(--rg);
        }
        .search-input::placeholder { color: var(--td); }
        .search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--tm);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 6px;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }
        .search-clear.visible { opacity: 1; pointer-events: auto; }
        .search-clear:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .btn {
            padding: 9px 18px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--red);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--red2);
            box-shadow: var(--shadow-red);
            transform: translateY(-1px);
        }
        .btn-glass {
            background: var(--glass);
            border: 1px solid var(--bm);
            color: var(--tp);
        }
        .btn-glass:hover {
            background: var(--glassh);
            border-color: var(--bb);
        }
        .filter-dropdown {
            position: relative;
        }
        .filter-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 200px;
            background: rgba(20, 20, 35, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid var(--bm);
            border-radius: var(--radius);
            padding: 6px;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: var(--transition);
            z-index: 200;
        }
        .filter-menu.open { opacity: 1; visibility: visible; transform: translateY(0); }
        .filter-option {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--ts);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
        }
        .filter-option:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .filter-option.active { background: rgba(230, 57, 70, 0.15); color: #fff; }
        .filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .filter-dot--all { background: #fff; }
        .filter-dot--safe { background: var(--green); }
        .filter-dot--euclid { background: var(--orange); }
        .filter-dot--keter { background: var(--red); }
        .filter-dot--thaumiel { background: var(--blue); }
        .filter-dot--neutralized { background: var(--tm); }
        .filter-dot--explained { background: var(--purple); }

        .stats-badge {
            display: flex;
            align-items: baseline;
            gap: 4px;
            padding: 6px 12px;
            background: var(--glass);
            border-radius: 100px;
            border: 1px solid var(--bs);
            flex-shrink: 0;
        }
        .stats-number {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--rb);
        }
        .stats-label {
            font-size: 0.7rem;
            color: var(--tm);
        }

        /* Мобильное меню */
        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            flex-shrink: 0;
        }
        .mobile-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background: #fff;
            margin: 4px 0;
            border-radius: 1px;
            transition: var(--transition);
        }
        .mobile-panel {
            display: none;
            padding: 0 20px 16px;
            flex-direction: column;
            gap: 10px;
        }
        .mobile-panel.open { display: flex; }
        .mobile-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            background: var(--glass);
            border: 1px solid var(--bm);
            color: var(--ts);
        }
        .chip:hover { border-color: var(--bb); color: #fff; }
        .chip.active { background: var(--red); border-color: var(--red); color: #fff; }

        /* Контент */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-family: var(--mono);
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
        }
        .section-line {
            flex: 1;
            height: 1px;
            background: var(--bm);
            min-width: 40px;
        }

        /* Сетка карточек */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 18px;
        }
        .scp-card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--bs);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            min-height: 360px;
        }
        .scp-card:hover {
            transform: translateY(-6px);
            border-color: var(--bb);
            box-shadow: var(--shadow), var(--shadow-red);
        }
        .scp-card.custom {
            border-left: 3px solid var(--blue);
        }
        .scp-card.custom::after {
            content: 'ПОЛЬЗОВАТЕЛЬСКИЙ';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--mono);
            font-size: 0.5rem;
            letter-spacing: 2px;
            color: var(--blue);
            z-index: 3;
            background: rgba(0,0,0,0.7);
            padding: 3px 10px;
            border-radius: 100px;
        }
        .card-image {
            position: relative;
            height: 180px;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: brightness(0.7);
        }
        .scp-card:hover .card-image img {
            transform: scale(1.08);
            filter: brightness(0.4);
        }
        .card-image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--card) 0%, transparent 50%);
        }
        .card-class {
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 100px;
            z-index: 2;
            backdrop-filter: blur(8px);
        }
        .card-class--safe { background: rgba(42, 157, 143, 0.3); color: #4ecdc4; border: 1px solid rgba(42, 157, 143, 0.5); }
        .card-class--euclid { background: rgba(244, 162, 97, 0.3); color: #f6bd60; border: 1px solid rgba(244, 162, 97, 0.5); }
        .card-class--keter { background: rgba(230, 57, 70, 0.3); color: #ff6b6b; border: 1px solid rgba(230, 57, 70, 0.5); }
        .card-class--thaumiel { background: rgba(69, 123, 157, 0.3); color: #84a7d8; border: 1px solid rgba(69, 123, 157, 0.5); }
        .card-class--neutralized { background: rgba(112, 112, 112, 0.3); color: #b0b0b0; border: 1px solid rgba(112, 112, 112, 0.5); }
        .card-class--explained { background: rgba(155, 93, 229, 0.3); color: #c4a7ed; border: 1px solid rgba(155, 93, 229, 0.5); }

        .card-id {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .card-body {
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            transition: var(--transition);
        }
        .scp-card:hover .card-title { color: var(--rb); }
        .card-description {
            font-size: 0.82rem;
            color: var(--ts);
            line-height: 1.5;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 8px;
            border-top: 1px solid var(--bs);
        }
        .card-btn {
            padding: 7px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: transparent;
            border: 1px solid var(--bm);
            color: var(--ts);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .scp-card:hover .card-btn {
            border-color: var(--red);
            color: #fff;
            background: rgba(230, 57, 70, 0.1);
        }
        .card-delete {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--bm);
            background: transparent;
            color: var(--tm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            opacity: 0;
            transition: var(--transition);
        }
        .scp-card:hover .card-delete { opacity: 1; }
        .card-delete:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal {
            position: relative;
            width: 100%;
            max-width: 760px;
            max-height: 90vh;
            background: var(--bg2);
            border: 1px solid var(--bm);
            border-radius: var(--radius-xl);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            transform: translateY(30px) scale(0.94);
            transition: transform var(--transition-slow) cubic-bezier(0.22, 1, 0.36, 1);
        }
        .modal-overlay.open .modal { transform: translateY(0) scale(1); }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--bm);
            background: rgba(0,0,0,0.5);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }
        .modal-close:hover { background: var(--red); border-color: var(--red); }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--bs);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0,0,0,0.2);
        }
        .modal-stamp {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--red);
            border: 2px solid var(--red);
            padding: 5px 14px;
            border-radius: var(--radius-sm);
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .doc-image {
            width: 100%;
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid var(--bs);
            max-height: 320px;
            object-fit: cover;
        }
        .doc-info-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .doc-info-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--bs);
            border-radius: var(--radius);
            padding: 12px 14px;
        }
        .doc-info-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--td);
            margin-bottom: 3px;
        }
        .doc-info-value {
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
        }
        .doc-section {
            margin-bottom: 20px;
        }
        .doc-section-title {
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--bs);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .doc-text {
            font-size: 0.85rem;
            color: var(--ts);
            line-height: 1.7;
        }
        .doc-text p { margin-bottom: 10px; }
        .doc-text .redacted {
            background: #1a1a1a;
            color: #1a1a1a;
            padding: 1px 6px;
            border-radius: 3px;
            cursor: pointer;
            transition: var(--transition);
        }
        .doc-text .redacted:hover { color: var(--rb); background: rgba(230, 57, 70, 0.2); }
        .modal-footer {
            padding: 12px 24px;
            border-top: 1px solid var(--bs);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--td);
            background: rgba(0,0,0,0.2);
        }

        /* Панель создания */
        .create-overlay {
            position: fixed;
            inset: 0;
            z-index: 1099;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }
        .create-overlay.open { opacity: 1; visibility: visible; }
        .create-panel {
            position: fixed;
            top: 0;
            right: -460px;
            width: 440px;
            height: 100vh;
            z-index: 1100;
            background: var(--bg2);
            border-left: 1px solid var(--bm);
            box-shadow: -10px 0 40px rgba(0,0,0,0.6);
            transition: right var(--transition-slow);
            display: flex;
            flex-direction: column;
        }
        .create-panel.open { right: 0; }
        .cp-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--bs);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cp-header h2 {
            font-family: var(--mono);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .cp-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--bm);
            background: transparent;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .cp-close:hover { background: var(--red); border-color: var(--red); }
        .cp-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .cp-group { display: flex; flex-direction: column; gap: 4px; }
        .cp-group label {
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--td);
        }
        .cp-group input,
        .cp-group select,
        .cp-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--bm);
            border-radius: var(--radius);
            background: var(--card);
            color: #fff;
            font-family: var(--font);
            font-size: 0.82rem;
            outline: none;
            transition: var(--transition);
            resize: vertical;

            { id: "914", name: "«Заводной механизм»", class: "Safe", clearance: 2, status: "Содержится", image: "https://images.unsplash.com/photo-1509048191080-d2984bad6ae5?w=400", brief: "Устройство, улучшающее или ухудшающее предметы.", containment: "В мастерской. 5 настроек.", description: "SCP-914 изменяет свойства объектов.", history: "Найден в часовой мастерской." },

            { id: "1678", name: "«Зеркальный город»", class: "Euclid", clearance: 3, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Зеркальный лабиринт с живыми отражениями.", containment: "Вход опечатан.", description: "SCP-1678 — аномальный аттракцион.", history: "Построен в парке развлечений." },
            { id: "1730", name: "«Зона 13»", class: "Euclid", clearance: 4, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Альтернативная Зона Фонда из другого измерения.", containment: "Полная изоляция.", description: "SCP-1730 — разрушенная Зона из параллельной реальности.", history: "Обнаружена в пустыне." },
            { id: "2000", name: "«Механизм»", class: "Thaumiel", clearance: 5, status: "Активен", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Устройство для восстановления человечества.", containment: "Глубоко под землёй.", description: "SCP-2000 восстанавливает популяцию людей.", history: "Построен Фондом." },
            { id: "2006", name: "«Страх»", class: "Keter", clearance: 3, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Существо, принимающее форму страхов наблюдателя.", containment: "Камера с постоянным освещением.", description: "SCP-2006 трансформируется в то, чего боится зритель.", history: "Обнаружено в кинотеатре." },
            { id: "2317", name: "«Дверь»", class: "Keter", clearance: 5, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Дверь в измерение с разрушенным миром.", containment: "7 замков. Ежедневная проверка.", description: "SCP-2317 ведёт к мёртвому богу.", history: "Обнаружена в подвале." },
            { id: "2521", name: "●●|●●●●●|●●|●", class: "Keter", clearance: 4, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Существо, похищающее информацию о себе.", containment: "Не описывать словами.", description: "SCP-2521 забирает всё, что его описывает.", history: "Неизвестна." },
            { id: "2662", name: "«Ктулху»", class: "Euclid", clearance: 2, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Существо, похожее на Ктулху, но ведущее себя как подросток.", containment: "Стандартная камера.", description: "SCP-2662 — несовершеннолетнее божество.", history: "Само пришло в Фонд." },
            { id: "2845", name: "«Олень»", class: "Keter", clearance: 4, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Олень, превращающий людей в соляные столбы.", containment: "Ритуал сдерживания каждые 6 часов.", description: "SCP-2845 требует сложного ритуала.", history: "Обнаружен в Скандинавии." },
            { id: "3008", name: "«IKEA»", class: "Euclid", clearance: 2, status: "Под наблюдением", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Бесконечный магазин IKEA с агрессивным персоналом.", containment: "Вход под наблюдением.", description: "SCP-3008 — бесконечное пространство внутри обычного магазина.", history: "Обнаружен после сообщений о пропавших." },
            { id: "3199", name: "«Курица»", class: "Keter", clearance: 3, status: "Содержится", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Курицы, взрывающиеся при стрессе.", containment: "Звукоизолированный вольер.", description: "SCP-3199 размножаются с огромной скоростью.", history: "Обнаружены на ферме." },
            { id: "3999", name: "«Исследователь Таллоран»", class: "Neutralized", clearance: 3, status: "Нейтрализован", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Реальность, созданная бывшим исследователем.", containment: "Не требуется.", description: "SCP-3999 был нейтрализован.", history: "Связан с исследователем Таллоран." },
            { id: "4666", name: "«Йольский человек»", class: "Keter", clearance: 4, status: "Не содержан", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Существо, охотящееся на семьи в рождественский период.", containment: "Мониторинг в декабре-январе.", description: "SCP-4666 похищает детей.", history: "Активен с XIX века." },
            { id: "4999", name: "«Свидетель»", class: "Safe", clearance: 2, status: "Не содержан", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Человек, появляющийся рядом с умирающими в одиночестве.", containment: "Не требуется.", description: "SCP-4999 утешает умирающих.", history: "Зафиксирован на камерах." },
            { id: "5000", name: "«Почему?»", class: "Explained", clearance: 5, status: "Объяснён", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400", brief: "Событие, раскрывшее истинную природу Фонда.", containment: "Не требуется.", description: "SCP-5000 — временная линия, где Фонд уничтожил человечество.", history: "Зафиксировано в альтернативной реальности." }
        ];

        // ==================== ПРИЛОЖЕНИЕ ====================
        let scpData = JSON.parse(localStorage.getItem('scpCustomData') || '[]');
        const allSCPs = () => [...DEFAULT_SCPS, ...scpData];
        let currentFilter = 'all', currentSearch = '';

        const $ = id => document.getElementById(id);
        const cardsGrid = $('cardsGrid');
        const searchInput = $('searchInput');
        const searchClear = $('searchClear');
        const filterMenu = $('filterMenu');
        const filterTrigger = $('filterTrigger');
        const statsNumber = $('statsNumber');
        const mobileToggle = $('mobileToggle');
        const mobilePanel = $('mobilePanel');
        const mobileSearch = $('mobileSearch');
        const modalOverlay = $('modalOverlay');
        const modalBody = $('modalBody');
        const modalStamp = $('modalStamp');
        const modalClearance = $('modalClearance');
        const modalFooterId = $('modalFooterId');
        const modalClose = $('modalClose');
        const createOverlay = $('createOverlay');
        const createPanel = $('createPanel');

        function saveCustom() { localStorage.setItem('scpCustomData', JSON.stringify(scpData)); }
        function filterData() {
            let d = allSCPs();
            if (currentFilter !== 'all') d = d.filter(s => s.class === currentFilter);
            if (currentSearch.trim()) {
                const q = currentSearch.toLowerCase().trim();
                d = d.filter(s => (s.id||'').toLowerCase().includes(q) || (s.name||'').toLowerCase().includes(q) || (s.class||'').toLowerCase().includes(q) || (s.brief||'').toLowerCase().includes(q));
            }
            return d;
        }
        function renderCards() {
            const data = filterData();
            cardsGrid.innerHTML = '';
            statsNumber.textContent = data.length;
            data.forEach((scp, i) => {
                const card = document.createElement('div');
                card.className = `scp-card${scpData.includes(scp) ? ' custom' : ''}`;
                card.style.animationDelay = `${i * 0.03}s`;
                card.innerHTML = `
                    <div class="card-image">
                        <img src="${scp.image || 'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400'}" alt="SCP-${scp.id}" onerror="this.src='https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400'" loading="lazy">
                        <div class="card-image-overlay"></div>
                        <span class="card-class card-class--${(scp.class||'safe').toLowerCase()}">${scp.class}</span>
                        <span class="card-id">SCP-${scp.id}</span>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${scp.name}</h3>
                        <p class="card-description">${scp.brief || 'Описание отсутствует.'}</p>
                        <div class="card-footer">
                            <button class="card-btn">Подробнее <i class="fa-solid fa-arrow-right" style="font-size:0.6rem"></i></button>
                            ${scpData.includes(scp) ? `<button class="card-delete" data-id="${scp.id}"><i class="fa-solid fa-trash"></i></button>` : ''}
                        </div>
                    </div>`;
                card.addEventListener('click', e => {
                    if (e.target.closest('.card-delete')) {
                        e.stopPropagation();
                        scpData = scpData.filter(s => s.id !== scp.id);
                        saveCustom();
                        renderCards();
                        return;
                    }
                    openModal(scp);
                });
                cardsGrid.appendChild(card);
            });
        }
        function openModal(scp) {
            modalBody.innerHTML = `
                ${scp.imageLarge || scp.image ? `<img src="${scp.imageLarge || scp.image}" class="doc-image" onerror="this.style.display='none'">` : ''}
                <div class="doc-info-row">
                    <div class="doc-info-card"><div class="doc-info-label">Номер</div><div class="doc-info-value">SCP-${scp.id}</div></div>
                    <div class="doc-info-card"><div class="doc-info-label">Класс</div><div class="doc-info-value">${scp.class}</div></div>
                    <div class="doc-info-card"><div class="doc-info-label">Допуск</div><div class="doc-info-value">${scp.clearance || '?'}</div></div>
                    <div class="doc-info-card"><div class="doc-info-label">Статус</div><div class="doc-info-value">${scp.status || 'Содержится'}</div></div>
                </div>
                <div class="doc-section"><div class="doc-section-title">📋 Название</div><div class="doc-text"><p><strong>${scp.name}</strong></p></div></div>
                ${scp.containment ? `<div class="doc-section"><div class="doc-section-title">🔒 Особые условия содержания</div><div class="doc-text">${scp.containment.split('\n').map(p => `<p>${p}</p>`).join('')}</div></div>` : ''}
                ${scp.description ? `<div class="doc-section"><div class="doc-section-title">📄 Описание</div><div class="doc-text">${scp.description.split('\n').map(p => `<p>${p}</p>`).join('')}</div></div>` : ''}
                ${scp.history ? `<div class="doc-section"><div class="doc-section-title">📜 История</div><div class="doc-text">${scp.history.split('\n').map(p => `<p>${p}</p>`).join('')}</div></div>` : ''}
                ${scp.notes ? `<div class="doc-section"><div class="doc-section-title">📝 Заметки</div><div class="doc-text">${scp.notes.split('\n').map(p => `<p>${p}</p>`).join('')}</div></div>` : ''}
            `;
            modalStamp.textContent = scp.class === 'Keter' ? 'TOP SECRET' : 'SECRET';
            modalClearance.textContent = `Уровень допуска: ${scp.clearance || 4}`;
            modalFooterId.textContent = `SCP-${scp.id}`;
            modalOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            setTimeout(() => modalBody.scrollTop = 0, 50);
        }
        function closeModal() {
            modalOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // Поиск
        searchInput.addEventListener('input', function() {
            currentSearch = this.value;
            mobileSearch.value = this.value;
            searchClear.classList.toggle('visible', !!this.value.trim());
            renderCards();
        });
        searchClear.addEventListener('click', () => { searchInput.value = ''; mobileSearch.value = ''; currentSearch = ''; searchClear.classList.remove('visible'); renderCards(); });
        mobileSearch.addEventListener('input', function() { currentSearch = this.value; searchInput.value = this.value; searchClear.classList.toggle('visible', !!this.value.trim()); renderCards(); });

        // Фильтр
        filterTrigger.addEventListener('click', e => { e.stopPropagation(); filterMenu.classList.toggle('open'); });
        document.addEventListener('click', e => { if (!filterTrigger.contains(e.target) && !filterMenu.contains(e.target)) filterMenu.classList.remove('open'); });
        filterMenu.querySelectorAll('.filter-option').forEach(btn => {
            btn.addEventListener('click', function() {
                currentFilter = this.dataset.class;
                filterMenu.querySelectorAll('.filter-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.chip').forEach(c => { c.classList.remove('active'); if (c.dataset.class === currentFilter) c.classList.add('active'); });
                renderCards();
                filterMenu.classList.remove('open');
            });
        });
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', function() {
                currentFilter = this.dataset.class;
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                filterMenu.querySelectorAll('.filter-option').forEach(b => { b.classList.remove('active'); if (b.dataset.class === currentFilter) b.classList.add('active'); });
                renderCards();
            });
        });

        // Мобильное меню
        mobileToggle.addEventListener('click', () => { mobilePanel.classList.toggle('open'); });

        // Создание SCP
        $('openCreateBtn').addEventListener('click', () => { createOverlay.classList.add('open'); createPanel.classList.add('open'); document.body.style.overflow = 'hidden'; });
        function closeCreatePanel() { createOverlay.classList.remove('open'); createPanel.classList.remove('open'); document.body.style.overflow = ''; }
        $('cpClose').addEventListener('click', closeCreatePanel);
        $('cpCancel').addEventListener('click', closeCreatePanel);
        createOverlay.addEventListener('click', closeCreatePanel);
        $('cpCreate').addEventListener('click', () => {
            const id = $('cpId').value.trim();
            const name = $('cpName').value.trim();
            if (!id || !name) { alert('Укажите номер и название!'); return; }
            const newSCP = {
                id, name,
                class: $('cpClass').value,
                clearance: parseInt($('cpClearance').value) || 2,
                status: 'Содержится',
                image: $('cpImage').value.trim() || `https://picsum.photos/seed/scp${id}/400/300`,
                imageLarge: $('cpImage').value.trim() || `https://picsum.photos/seed/scp${id}/800/500`,
                brief: $('cpBrief').value.trim() || 'Описание отсутствует.',
                containment: $('cpContainment').value.trim(),
                description: $('cpDescription').value.trim(),
                history: $('cpHistory').value.trim(),
                notes: $('cpNotes').value.trim()
            };
            scpData.push(newSCP);
            saveCustom();
            renderCards();
            closeCreatePanel();
            ['cpId','cpName','cpImage','cpBrief','cpContainment','cpDescription','cpHistory','cpNotes'].forEach(f => $(f).value = '');
        });

        // Старт
        renderCards();
    </script>
</body>
</html>
